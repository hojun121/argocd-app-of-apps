apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    cluster: master
    appType: app-of-apps
  name: master-applications
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valueFiles:
        - shared-values.yaml
        - master-values.yaml
      parameters:
        - name: global.domain
          value: "testdomain.com"
        - name: spec.source.targetRevision
          value: "main"
    path: application/helm
    repoURL: https://github.com/hojun121/argocd-app-of-apps
    targetRevision: HEAD
