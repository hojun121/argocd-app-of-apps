spec:
  destination:
    type: server
    clusterInfo: https://kubernetes.default.svc
  project: default

global:
  # 기본시나리오에서는 privateRegistry값만 변경해주면 된다
  # e.x) 172.22.6.2:5000 or hyperregistry.domain.com
  privateRegistry: test-registry.com
  # 값 변경 필요 없음
  adminUser: test@test.co.kr
  cluster: master
  clusterName: in-cluster
  clusterNamespace: default
  domain: testdomain.com

modules:
  ### efk
  efk:
    enabled: false
    es:
      version: 7.2.1
      limitMemory: 8Gi
      requestMemory: 5Gi
      jvmHeap: "-Xms4g -Xmx4g"
      volumeSize: 50Gi
    busyBox:
      version: 1.32.0
    kibana:
      version: 7.2.0
      svcType: ClusterIP
      subdomain: kibana
    gatekeeper:
      version: 10.0.0
    fluentd:
      version: v1.4.2-debian-elasticsearch-1.1
     
  ### opensearch
  opensearch:
    enabled: true
    logLevel: info
    # opensearch-dashboards에서 지원하는 loglevel에 대한 config 설정을 기준으로 함.
    # 사용 가능한 값 : error, info, debug
    os:
      version: 1.3.7
      limitMemory: 8Gi
      requestMemory: 5Gi
      jvmHeap: "-Xms4g -Xmx4g"
      volumeSize: 50Gi
    busyBox:
      version: 1.32.0
    dashboard:
      version: 1.3.7
      svcType: ClusterIP
      subdomain: opensearch-dashboard
    fluentd:
      version: fluentd-v1.15.3-debian-elasticsearch-1.0
      # default로 주는 경우 default storage class를 사용
      # default를 사용하지 않고 싶은 경우에는 storage class이름을 기입
      storageClass: default
  
  ### Loki
  loki:
    enabled: true
    logLevel: info
    # 사용 가능한 값 : error, warn, info, debug
    loki: 
      version: 2.7.1
      volumeSize: 50Gi
      storageClass: default
    promtail:
      version: 2.7.1
  
  ### prometheus
  prometheus:
    enabled: true
    versions:
      prometheus: v2.41.0
      cmReload: v0.0.1
      cmReloader: v0.62.0
      operator: v0.62.0
      alertManager: v0.25.0
      kubeRbacProxy: v0.14.0
      kubeStateMetrics: v2.7.0
      nodeExporter: v1.5.0
      adapter: v0.10.0
    pvcSize: 10Gi

  ### grafana-operator
  grafanaOperator:
    enabled: true
    subdomain: grafana
    pvcSize: 10Gi
    operator: 
      version: v0.0.10
      imageRepo: docker.io/tmaxcloudck/grafana-operator
    grafana:
      version: "9.3.2"
      imageRepo: docker.io/grafana/grafana

  ### grafana
  grafana:
    enabled: false
    subdomain: grafana
    pvcSize: 10Gi
    version: "9.3.2"
    imageRepo: docker.io/grafana/grafana
